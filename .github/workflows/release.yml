# Builds Alan.app and publishes it as a GitHub Release. Two triggers:
#
# - pushing a version tag:        git tag v1.1 && git push origin v1.1
# - manual dispatch (Actions → Release → Run workflow) with a version
#   input like "1.1"; the release is tagged v<version> at the built SHA.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, without the leading v (e.g. 1.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Alan.app
    # The project's deployment target is macOS 15.7, which needs a newer SDK
    # than the macos-15 image's default Xcode provides.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="v${INPUT_VERSION#v}"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          # Reject anything that isn't v<major>.<minor>[.<patch>] before it
          # reaches a shell interpolation or a malformed `gh release` call.
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Invalid version tag '$TAG' (expected vX.Y or vX.Y.Z)"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build (Release, ad-hoc signed)
        # The version is stamped into the app's CFBundleShortVersionString
        # via MARKETING_VERSION, and the CI run number into CFBundleVersion
        # (CURRENT_PROJECT_VERSION) so each release has a distinct build
        # number — otherwise every release ships CFBundleVersion 1, which
        # confuses LaunchServices and any future update mechanism. CI has no
        # certificates for the project's development team, so override
        # automatic signing with an ad-hoc identity ("-"). Values come in via
        # env vars, not string interpolation, so a crafted version input
        # can't reach the shell.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          xcodebuild build \
            -project Alan.xcodeproj \
            -scheme Alan \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            DEVELOPMENT_TEAM=

      - name: Zip the app
        # ditto preserves symlinks, resource forks, and permissions — the
        # reliable way to zip a .app bundle.
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: ditto -c -k --keepParent build/Build/Products/Release/Alan.app "Alan-${TAG}.zip"

      - name: Create GitHub release
        # On tag pushes the tag already exists; on manual dispatch
        # `gh release create` creates it at the commit that was built.
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" "Alan-${TAG}.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Alan $TAG" \
            --generate-notes \
            --notes "The app is ad-hoc signed (no Developer ID), so on first launch right-click the app and choose Open, or run \`xattr -d com.apple.quarantine Alan.app\`."
